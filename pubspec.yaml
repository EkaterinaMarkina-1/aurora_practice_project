name: ru.omgtu.aurora_flutter_app
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter
  ffi_plugin:
    path: plugins/ffi_plugin
  ffi: ^2.1.3
  path_provider: ^2.1.3

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  ffigen: ^19.0.0

flutter:
  uses-material-design: true

  assets:
  - assets/models/model_float32.tflite
  - assets/models/model_float16.tflite
  - assets/models/model_int8.tflite
 
  
