name: ffi_plugin
description: "A new Flutter FFI plugin project."
version: 0.0.1
homepage:

environment:
  sdk: ^3.6.0
  flutter: '>=3.3.0'

dependencies:
  flutter:
    sdk: flutter
  ffi: ^2.1.3
  plugin_platform_interface: ^2.0.2
  path_provider: ^2.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  ffigen: ^19.0.0

flutter:
  plugin:
    platforms:
      aurora:
        ffiPlugin: true
        pluginClass: FfiPlugin
        dartPluginClass: FfiPlugin

aurora:
  pluginClass: FfiPlugin
  registrantClass: FfiPluginRegistrant
